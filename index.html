<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Food Tracker</title>
<link rel="stylesheet" href="/style.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<div class="header">
  <h1>Food Tracker</h1>
  <button class="btn btn-sm" onclick="exportData()">Export</button>
</div>

<div class="tab-bar">
  <button class="active" data-tab="pantry">Pantry</button>
  <button data-tab="meals">Meals</button>
  <button data-tab="add">Add</button>
</div>

<div class="main-wrap" id="mainWrap">
  <div class="refresh-indicator" id="refreshIndicator">Pull to refresh</div>
  <div class="main" id="main">

    <div class="view active" id="view-pantry">
      <div class="search-bar">
        <input type="text" id="pantrySearch" placeholder="Search pantry..." oninput="renderPantry()">
      </div>
      <button class="btn btn-primary" onclick="openLogMeal()" style="width:100%;margin-bottom:12px">Log a Meal</button>
      <div id="pantryList"></div>
    </div>

    <div class="view" id="view-meals">
      <div id="mealsList"></div>
    </div>

    <div class="view" id="view-add">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startScan()">Scan Barcode</button>
        <button class="btn" onclick="showManualBarcode()">Type Barcode</button>
        <button class="btn" onclick="showManualForm()">Manual</button>
      </div>

      <div id="manualBarcode" style="display:none;margin-bottom:12px">
        <label>Barcode Number</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="manualBarcodeInput" placeholder="e.g. 5601234567890">
          <button class="btn btn-primary" onclick="lookupManualBarcode()">Look Up</button>
        </div>
      </div>

      <div id="manualForm" style="display:none">
        <h3 id="formTitle" style="font-size:16px;font-weight:600;margin-bottom:4px">Add Food</h3>
        <label>Food Name</label>
        <input type="text" id="fName" placeholder="e.g. Bagel">
        <label>Brand</label>
        <input type="text" id="fBrand" placeholder="e.g. Brand A">
        <div class="form-row">
          <div>
            <label>Serving Size</label>
            <input type="number" id="fServingQty" value="100" step="any">
          </div>
          <div>
            <label>Unit</label>
            <input type="text" id="fServingUnit" value="g" placeholder="g / ml">
          </div>
        </div>
        <div class="form-row">
          <div><label>Calories (kcal)</label><input type="number" id="fKcal" step="any"></div>
          <div><label>Protein (g)</label><input type="number" id="fProtein" step="any"></div>
        </div>
        <div class="form-row">
          <div><label>Carbs (g)</label><input type="number" id="fCarbs" step="any"></div>
          <div><label>Fat (g)</label><input type="number" id="fFat" step="any"></div>
        </div>
        <div class="form-row">
          <div><label>Fiber (g)</label><input type="number" id="fFiber" step="any"></div>
          <div><label>Barcode</label><input type="text" id="fBarcode" placeholder="Optional"></div>
        </div>
        <button class="btn btn-primary" onclick="saveFoodItem()" style="width:100%;margin-top:14px">Save to Pantry</button>
        <button class="btn" onclick="clearAddForm()" style="width:100%;margin-top:6px">Cancel</button>
      </div>

      <div id="scanner" style="display:none"></div>
      <div id="scanControls" style="display:none">
        <button class="btn btn-danger" onclick="stopScan()">Cancel Scan</button>
      </div>
    </div>

  </div>
</div>

<!-- Meal Modal -->
<div class="overlay" id="mealModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 id="mealModalTitle" style="margin-bottom:0">Log a Meal</h2>
      <button class="btn btn-sm btn-danger" id="deleteMealBtn" onclick="deleteMeal(editMealId)" style="display:none">Delete</button>
    </div>
    <div class="form-row">
      <div>
        <label>Date</label>
        <input type="date" id="mealDate">
      </div>
      <div>
        <label>Meal</label>
        <select id="mealType">
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
          <option value="dinner">Dinner</option>
          <option value="snack">Snack</option>
        </select>
      </div>
    </div>
    <div id="mealItems"></div>
    <button class="btn" onclick="addMealEntry()" style="width:100%;margin:8px 0">+ Add Item</button>
    <div class="totals">
      <div class="grid">
        <div><div class="stat">Calories</div><div class="val" id="tKcal">0</div></div>
        <div><div class="stat">Protein</div><div class="val" id="tProtein">0g</div></div>
        <div><div class="stat">Carbs</div><div class="val" id="tCarbs">0g</div></div>
        <div><div class="stat">Fat</div><div class="val" id="tFat">0g</div></div>
        <div><div class="stat">Fiber</div><div class="val" id="tFiber">0g</div></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeMealModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMeal()">Save Meal</button>
    </div>
  </div>
</div>

<script src="/db.js"></script>
<script src="/app.js"></script>
</body>
</html>
